name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6)
        run: |
          # The default Xcode on macos-14 ships Swift 5.10, but Package.swift
          # requires swift-tools-version 6.0. Pick the newest Xcode 16.x present.
          xcode="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$xcode" ]; then
            echo "No Xcode 16.x found on runner" >&2
            ls -d /Applications/Xcode*.app >&2 || true
            exit 1
          fi
          echo "Using $xcode"
          echo "DEVELOPER_DIR=$xcode/Contents/Developer" >> "$GITHUB_ENV"

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Version consistency
        run: |
          file_version="$(tr -d '[:space:]' < VERSION)"
          echo "VERSION file: $file_version"
          grep -q "\"$file_version\"" Sources/Auricle/Model/Models.swift \
            || { echo "AppInfo.version does not match VERSION file ($file_version)"; exit 1; }
