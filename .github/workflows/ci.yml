name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Version consistency
        run: |
          file_version="$(tr -d '[:space:]' < VERSION)"
          echo "VERSION file: $file_version"
          grep -q "\"$file_version\"" Sources/Auricle/Model/Models.swift \
            || { echo "AppInfo.version does not match VERSION file ($file_version)"; exit 1; }
