# SwiftLint configuration for Auricle.
# Run locally with: swiftlint  (brew install swiftlint)
# CI does not gate on SwiftLint — it is an opt-in local aid.

included:
  - Sources
  - Tests

excluded:
  - .build
  - dist

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

identifier_name:
  # Audio DSP code uses short, domain-standard names (b0, a1, Fs, EQ, dB).
  min_length: 1
  allowed_symbols: ["_"]

type_name:
  min_length: 2

function_body_length:
  warning: 80
  error: 140

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 800
  error: 1000

disabled_rules:
  - todo
